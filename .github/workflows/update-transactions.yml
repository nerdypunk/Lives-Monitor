name: Update token transactions

on:
  workflow_dispatch:
    inputs:
      full_history:
        description: "Backfill all historical token signatures into data/transactions.json"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Show runtime
        run: |
          node --version
          pwd
          ls -la
      - name: Fetch latest transactions
        env:
          SOLSCAN_API_KEY: ${{ secrets.SOLSCAN_API_KEY }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          FULL_HISTORY: ${{ github.event.inputs.full_history || 'false' }}
        run: |
          set -euo pipefail
          node scripts/update-data.mjs
          echo "Generated data file:"
          wc -c data/transactions.json
          head -40 data/transactions.json
      - name: Commit updated data
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/transactions.json
          if git diff --cached --quiet; then
            echo "No transaction data changes to commit."
          else
            git commit -m "Update token transactions data"
            git push
          fi
